services:
  backend:
    image: ${DOCKER_IMAGE_BACKEND:-ghcr.io/rise-001/aippt-backend:latest}
    container_name: aippt-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
      - "1455:1455"
    env_file:
      - .env
    volumes:
      - ./backend/instance:/app/backend/instance
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - aippt-network

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-ghcr.io/rise-001/aippt-frontend:latest}
    container_name: aippt-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - aippt-network

networks:
  aippt-network:
    driver: bridge
