name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag to publish'
        required: true
        default: latest
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-publish-${{ inputs.tag }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: rise-001

jobs:
  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all-in-one image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.allinone
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/aippt:${{ inputs.tag }}
          build-args: |
            GHCR_REGISTRY=ghcr.io/
            APP_COMMIT_SHA=${{ github.sha }}
            APP_COMMIT_SHORT_SHA=${{ github.sha }}
            APP_VERSION_TAG=${{ inputs.tag }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/aippt-backend:${{ inputs.tag }}
          build-args: |
            GHCR_REGISTRY=ghcr.io/
            APP_COMMIT_SHA=${{ github.sha }}
            APP_COMMIT_SHORT_SHA=${{ github.sha }}
            APP_VERSION_TAG=${{ inputs.tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/aippt-frontend:${{ inputs.tag }}
          build-args: |
            DOCKER_BUILDKIT=1
            APP_COMMIT_SHA=${{ github.sha }}
            APP_COMMIT_SHORT_SHA=${{ github.sha }}
            APP_VERSION_TAG=${{ inputs.tag }}
