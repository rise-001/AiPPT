name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag to publish (default: latest)'
        required: false
        default: latest
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: rise-001
  IMAGE_NAME: aippt

jobs:
  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            {
              echo "tags<<EOF"
              echo "${REGISTRY}/${OWNER}/${IMAGE_NAME}:latest"
              echo "${REGISTRY}/${OWNER}/${IMAGE_NAME}:sha-${GITHUB_SHA::7}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ inputs.tag }}"
            {
              echo "tags<<EOF"
              echo "${REGISTRY}/${OWNER}/${IMAGE_NAME}:${TAG}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push all-in-one image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.allinone
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GHCR_REGISTRY=ghcr.io/
            APP_COMMIT_SHA=${{ github.sha }}
            APP_COMMIT_SHORT_SHA=${{ github.sha }}
            APP_VERSION_TAG=${{ steps.meta.outputs.version }}
