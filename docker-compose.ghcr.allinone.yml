services:
  app:
    image: ${DOCKER_IMAGE:-ghcr.io/rise-001/aippt:latest}
    container_name: aippt
    ports:
      - "${PORT:-3000}:80"
    env_file:
      - .env
    volumes:
      - ./backend/instance:/app/backend/instance
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
